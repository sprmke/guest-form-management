# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
project_id = "guest-form-management"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
# Postgres 17 local stack needs a current Supabase CLI (≈2.80+) so `storage.*` exists
# before user migrations run. If `storage.buckets` / `storage.objects` errors appear on
# `db reset`, run: `npm run db:reset` or `npx supabase@latest db reset`.
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

# Admin sign-in (Google OAuth). Set GOOGLE_CLIENT_ID + GOOGLE_CLIENT_SECRET in
# ui/.env.development (same file as Vite dev vars). dev.sh / npm run start:supabase
# load that file into the environment before `supabase start`. Google Cloud → OAuth
# Web client → Authorized redirect URIs: http://127.0.0.1:54321/auth/v1/callback and
# http://localhost:54321/auth/v1/callback
[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = [
  "http://127.0.0.1:5173/**",
  "http://localhost:5173/**",
]

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
skip_nonce_check = false

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.payment-receipts]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg"]

[storage.buckets.pet-vaccinations]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg"]

# --- New-flow buckets (Phase 0, see docs/NEW_FLOW_PLAN.md §2) ---

[storage.buckets.parking-endorsements]
public = true
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "application/pdf"]

[storage.buckets.approved-gafs]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf"]

[storage.buckets.approved-pet-forms]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["application/pdf"]

[storage.buckets.sd-refund-receipts]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "application/pdf"]

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# ── Public (guest-facing) functions — no JWT required ──────────────────────────
[functions.submit-form]
verify_jwt = false

[functions.get-booked-dates]
verify_jwt = false

[functions.get-form]
verify_jwt = false

# ── Admin functions — Kong JWT gate disabled; verifyAdminJwt() in handler is the gate ──
# verify_jwt = true uses Kong's HS256 secret which rejects newer ES256 auth tokens
# (Supabase local dev ≥ 1.x issues ES256 JWTs). Our verifyAdminJwt() calls
# supabase.auth.getUser() which handles both algorithms and additionally
# checks the ADMIN_ALLOWED_EMAILS allow-list — stronger than the Kong gate.
[functions.list-bookings]
verify_jwt = false

[functions.transition-booking]
verify_jwt = false

[functions.upload-booking-asset]
verify_jwt = false

[functions.cancel-booking]
verify_jwt = false

[functions.cleanup-test-data]
verify_jwt = false

[functions.parking-broadcast-email]
verify_jwt = false

# ── Scheduled / internal — served locally + triggered by cron in cloud ────────
# The `schedule` key is Cloud-only — do NOT add it here or the local CLI will
# fail to parse config.toml. Set the cron schedule in the Supabase dashboard.
# Both functions are served locally (so the "Run now" admin buttons work) and
# callable with an admin JWT from the WorkflowPanel (Q6.6).
[functions.gmail-listener]
verify_jwt = false

[functions.sd-refund-cron]
verify_jwt = false
# Cloud-only schedule:
# schedule = "*/5 * * * *"   ← set this in Supabase dashboard, NOT here

# ── kept for reference (cloud schedule lines, never uncomment locally) ─────────
# [functions.gmail-listener] schedule = "*/5 * * * *"
# [functions.sd-refund-cron] schedule = "*/5 * * * *"
# schedule = "*/5 * * * *"